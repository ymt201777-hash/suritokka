<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塾内写真 | 犬山数学理科特化塾</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e0c0a;
    --cream: #f4efe6;
    --warm-mid: #c8b89a;
    --warm-light: #e8dfd0;
    --serif-jp: 'Noto Serif JP', 'ヒラギノ明朝 ProN', serif;
    --serif-en: 'Cormorant Garamond', Georgia, serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--ink); font-family: var(--serif-jp); font-weight: 300; -webkit-font-smoothing: antialiased; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 52px; height: 72px;
    background: rgba(244, 239, 230, 0);
    backdrop-filter: blur(0px);
    border-bottom: 1px solid transparent;
    transition: background 0.5s, backdrop-filter 0.5s, border-color 0.5s;
  }
  nav.scrolled {
    background: rgba(244, 239, 230, 0.92);
    backdrop-filter: blur(14px);
    border-bottom-color: rgba(14, 12, 10, 0.07);
  }
  .nav-logo {
    font-family: var(--serif-jp); font-weight: 200;
    font-size: 12px; letter-spacing: 0.2em;
    opacity: 0.85; position: relative; z-index: 101; cursor: pointer;
  }
  .nav-links { display: flex; gap: 32px; list-style: none; pointer-events: none; }
  .nav-links li { pointer-events: auto; }
  .nav-links a {
    font-family: var(--serif-jp); font-weight: 200;
    font-size: 11.5px; letter-spacing: 0.14em;
    opacity: 0.5; transition: opacity 0.3s; position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0;
    width: 0; height: 1px; background: var(--ink);
    transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .nav-links a:hover { opacity: 1; }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta {
    opacity: 0.85 !important;
    padding: 6px 18px;
    border: 1px solid var(--ink);
    transition: background 0.3s, color 0.3s, opacity 0.3s;
  }
  .nav-cta::after { display: none !important; }
  .nav-cta:hover {
    background: var(--ink); color: var(--cream); opacity: 1 !important;
  }

  .hamburger {
    display: none; background: none; border: none; cursor: pointer;
    width: 28px; height: 20px; position: relative; z-index: 110;
  }
  .hamburger span {
    display: block; width: 100%; height: 1px; background: var(--ink);
    position: absolute; left: 0; transition: all 0.35s;
  }
  .hamburger span:nth-child(1) { top: 0; }
  .hamburger span:nth-child(2) { top: 50%; }
  .hamburger span:nth-child(3) { top: 100%; }
  .hamburger.open span:nth-child(1) { top: 50%; transform: rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { top: 50%; transform: rotate(-45deg); }

  .mobile-menu {
    display: none; position: fixed; inset: 0; z-index: 105;
    background: var(--cream);
    flex-direction: column; justify-content: center; align-items: center; gap: 36px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    font-family: var(--serif-jp); font-weight: 300;
    font-size: 15px; letter-spacing: 0.18em;
    opacity: 0.7; transition: opacity 0.3s;
  }
  .mobile-menu a:hover { opacity: 1; }
  .mobile-menu .mobile-cta {
    margin-top: 12px;
    padding: 12px 36px;
    border: 1px solid var(--ink);
    opacity: 1;
    transition: background 0.3s, color 0.3s;
  }
  .mobile-menu .mobile-cta:hover {
    background: var(--ink); color: var(--cream);
  }

  .page-header { padding: 160px 52px 80px; max-width: 1100px; margin: 0 auto; }
  .page-label {
    font-family: var(--serif-en); font-weight: 300; font-size: 11px;
    letter-spacing: 0.38em; text-transform: uppercase; color: var(--warm-mid);
    margin-bottom: 28px; display: flex; align-items: center; gap: 20px;
  }
  .page-label::after { content: ''; width: 48px; height: 1px; background: var(--warm-mid); }
  .page-title { font-weight: 200; font-size: clamp(28px, 4vw, 48px); letter-spacing: 0.08em; }

  .content { max-width: 1100px; margin: 0 auto; padding: 0 52px 120px; }

  .gallery-group { margin-bottom: 64px; }
  .gallery-group-label {
    font-family: var(--serif-en); font-size: 10px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--warm-mid); margin-bottom: 16px;
    display: flex; align-items: center; gap: 16px;
  }
  .gallery-group-label::after { content: ''; flex: 1; height: 1px; background: rgba(14,12,10,0.08); }

  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .gallery-grid img {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover; display: block;
  }

  .cta-section { background: var(--warm-light); padding: 100px 52px; text-align: center; }
  .cta-text { font-weight: 200; font-size: 14px; letter-spacing: 0.2em; color: rgba(14,12,10,0.5); margin-bottom: 48px; }
  .cta-btn {
    display: inline-block; padding: 20px 64px;
    background: var(--ink); color: var(--cream);
    font-weight: 300; font-size: 14px; letter-spacing: 0.22em;
    text-decoration: none; position: relative; overflow: hidden; transition: all 0.4s;
  }
  .cta-btn::before {
    content: ''; position: absolute; inset: 0;
    background: var(--warm-mid); transform: scaleX(0);
    transform-origin: left; transition: transform 0.4s ease;
  }
  .cta-btn:hover::before { transform: scaleX(1); }
  .cta-btn span { position: relative; z-index: 1; }

  footer {
    background: var(--ink); color: rgba(244,239,230,0.4);
    padding: 64px 52px; display: flex;
    justify-content: center; align-items: center;
    font-weight: 200; font-size: 11px; letter-spacing: 0.15em;
  }

  @media (max-width: 768px) {
    nav { padding: 0 24px; height: 60px; }
    .nav-links { display: none; }
    .hamburger { display: block; }
    .page-header { padding: 120px 24px 60px; }
    .content { padding: 0 24px 80px; }
    .cta-section { padding: 80px 24px; }
    footer { flex-direction: column; gap: 24px; text-align: center; padding: 48px 24px; }
  }
</style>
</head>
<body>

<nav id="navbar">
  <a class="nav-logo" href="/">犬山数学理科特化塾</a>
  <ul class="nav-links">
    <li><a href="/results">合格実績</a></li>
    <li><a href="/instructors">講師紹介</a></li>
    <li><a href="/courses">コース・料金</a></li>
    <li><a href="/access">アクセス</a></li>
    <li><a href="/gallery">塾内写真</a></li>
    <li><a href="/booking" class="nav-cta">体験予約</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="/">トップ</a>
  <a href="/results">合格実績</a>
  <a href="/instructors">講師紹介</a>
  <a href="/courses">コース・料金</a>
  <a href="/access">アクセス</a>
  <a href="/gallery">塾内写真</a>
  <a href="/booking" class="mobile-cta">体験予約</a>
</div>

<div class="page-header">
  <div class="page-label">Gallery</div>
  <h1 class="page-title">塾内写真</h1>
</div>

<div class="content">

  <div class="gallery-group">
    <div class="gallery-group-label">外観</div>
    <div class="gallery-grid">
      <img src="photo_exterior_2.jpg" alt="外観">
      <img src="photo_exterior_1.jpg" alt="看板">
    </div>
  </div>

  <div class="gallery-group">
    <div class="gallery-group-label">教室</div>
    <div class="gallery-grid">
      <img src="photo_classroom_1.jpg" alt="教室">
      <img src="photo_classroom_2.jpg" alt="教室">
    </div>
  </div>

  <div class="gallery-group">
    <div class="gallery-group-label">自習室 1F</div>
    <div class="gallery-grid">
      <img src="photo_study1f_1.jpg" alt="自習室1F">
      <img src="photo_study1f_2.jpg" alt="自習室1F">
    </div>
  </div>

  <div class="gallery-group">
    <div class="gallery-group-label">自習室 2F — 私語厳禁</div>
    <div class="gallery-grid">
      <img src="photo_study2f_1.jpg" alt="自習室2F">
      <img src="photo_study2f_2.jpg" alt="自習室2F">
    </div>
  </div>

</div>

<div class="cta-section">
  <p class="cta-text">まずは、雰囲気を感じてみてください。</p>
  <a href="/booking.html" class="cta-btn"><span>無料体験を予約する</span></a>
</div>

<footer>
  <span>&copy; 2024 犬山数学理科特化塾</span>
</footer>

<script>
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 60);
});
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');
hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('open');
  mobileMenu.classList.toggle('open');
  document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
});
mobileMenu.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => {
    hamburger.classList.remove('open');
    mobileMenu.classList.remove('open');
    document.body.style.overflow = '';
  });
});
</script>

</body>
</html>
